<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Le colis - La bande velpeau</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./favicon.ico" />
  </head>

  <body class="font-serif">
    <header class="h-screen">
      <div class="relative w-full h-full bg-cover bg-center" style="background-image: url('./img/background.webp')">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-xs"></div>

        <div class="flex justify-center items-center h-full w-full flex-col relative z-10 px-4 text-center">
          <h1 class="text-4xl sm:text-5xl md:text-6xl text-zinc-300 animate-fadeInDown text-shadow-2xl">
            LA BANDE VELPEAU
          </h1>
          <p class="text-lg sm:text-xl text-zinc-300 italic mt-5 animate-fadeInDown md:px-20">
            “ Une citation choc de Frieda Thau dans son interview par l'INA „
          </p>
        </div>
      </div>
    </header>
    <div class="fixed top-4 left-4 z-50">
      <a href="./index.html" class="bg-black/50 text-white px-2 py-1 rounded hover:bg-black/70 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#ffffff">
          <path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z" />
        </svg>
        revenir à la liste
      </a>
    </div>

    <main class="mx-10 sm:mx-10 md:mx-20 lg:mx-40 xl:mx-60 my-10">
      <h1 class="text-3xl sm:text-4xl md:text-5xl mb-6">La bande velpeau</h1>

      <p class="leading-relaxed text-justify">
        <strong>Description :</strong>
        <br />
      </p>
      <div class="justify-center flex">
        <a
          href="./index.html"
          class="inline-flex items-center gap-2 px-6 py-3 bg-zinc-200 font-semibold rounded-lg mt-5 hover:bg-zinc-300">
          Voir la liste des objets
          <span class="text-lg">→</span>
        </a>
      </div>
    </main>

    <footer>
      <div class="text-center p-4">&copy; 2025 - 2026. Le colis</div>
    </footer>

    <!-- Script modale -->
    <script>
      // Fonction pour ouvrir une modale
      function openModal(modalId) {
        const modal = document.getElementById(modalId);
        modal.classList.remove('opacity-0', 'pointer-events-none');
        document.body.classList.add('overflow-hidden');
      }

      // Fonction pour fermer une modale
      function closeModal(modalId) {
        const modal = document.getElementById(modalId);
        modal.classList.add('opacity-0', 'pointer-events-none');
        document.body.classList.remove('overflow-hidden');
      }

      // Gestion de la première modale
      document.getElementById('open-modal-1').addEventListener('click', () => openModal('modal-1'));
      document.getElementById('close-modal-1').addEventListener('click', () => closeModal('modal-1'));
      document.getElementById('modal-1').addEventListener('click', (e) => {
        if (e.target === document.getElementById('modal-1')) {
          closeModal('modal-1');
        }
      });

      // Gestion de la deuxième modale
      document.getElementById('open-modal-2').addEventListener('click', () => openModal('modal-2'));
      document.getElementById('close-modal-2').addEventListener('click', () => closeModal('modal-2'));
      document.getElementById('modal-2').addEventListener('click', (e) => {
        if (e.target === document.getElementById('modal-2')) {
          closeModal('modal-2');
        }
      });

      // Gestion de la troisième modale
      document.getElementById('open-modal-3').addEventListener('click', () => openModal('modal-3'));
      document.getElementById('close-modal-3').addEventListener('click', () => closeModal('modal-3'));
      document.getElementById('modal-3').addEventListener('click', (e) => {
        if (e.target === document.getElementById('modal-3')) {
          closeModal('modal-3');
        }
      });

      // Gestion de la quatrième modale
      document.getElementById('open-modal-4').addEventListener('click', () => openModal('modal-4'));
      document.getElementById('close-modal-4').addEventListener('click', () => closeModal('modal-4'));
      document.getElementById('modal-4').addEventListener('click', (e) => {
        if (e.target === document.getElementById('modal-4')) {
          closeModal('modal-4');
        }
      });
    </script>
  </body>
</html>
