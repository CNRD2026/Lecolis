<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Le colis - 2 ans et demi dans les camps</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" href="./favicon.ico" />
  </head>

  <body class="font-serif">
    <header class="h-screen">
      <div class="relative w-full h-full bg-cover bg-center" style="background-image: url('./img/background.webp')">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-xs"></div>

        <div class="flex justify-center items-center h-full w-full flex-col relative z-10 px-4 text-center">
          <h1 class="text-4xl sm:text-5xl md:text-6xl text-zinc-300 animate-fadeInDown text-shadow-2xl">
            2 ANS ET DEMI DANS LES CAMPS
          </h1>
          <p class="text-lg sm:text-xl text-zinc-300 italic mt-5 animate-fadeInDown">
            “ Une citation choc de Frieda Thau dans son interview par l'INA „
          </p>
        </div>
      </div>
    </header>

    <main class="mx-10 sm:mx-10 md:mx-20 lg:mx-40 xl:mx-60 my-10">
      <h1 class="text-3xl sm:text-4xl md:text-5xl mb-6">2 ans et demi dans les camps (robe)</h1>

      <p class="leading-relaxed text-justify">
        <strong>Description :</strong>
        <br />
        De septembre 1942 à mai 1945, Frieda survit dans les camps, elle reconnait avoir eu une chance inouïe.
      </p>

      <!-- Image cliquable -->
      <img
        id="open-modal"
        class="rounded-2xl my-10 w-full max-w-3xl mx-auto cursor-zoom-in"
        src="./img/robe.webp"
        alt="" />

      <!-- Modale -->
      <div
        id="modal"
        class="fixed inset-0 z-50 bg-black/80 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <!-- Bouton de fermeture en haut à droite de l’écran -->
        <button
          id="close-modal"
          class="fixed top-4 right-4 bg-white text-black rounded-full w-9 h-9 flex items-center justify-center shadow-lg z-50">
          ✕
        </button>

        <!-- Contenu de la modale -->
        <div class="relative max-w-[90vw] max-h-[80vh] flex items-center justify-center">
          <img src="./img/robe.webp" class="w-auto h-auto max-w-[85vw] max-h-[80vh] rounded-xl shadow-xl" />
        </div>
      </div>
    </main>

    <footer>
      <div class="text-center p-4">&copy; 2025. Le colis</div>
    </footer>

    <!-- Script modale -->
    <script>
      const modal = document.getElementById('modal');
      const openBtn = document.getElementById('open-modal');
      const closeBtn = document.getElementById('close-modal');
      const body = document.body;

      function openModal() {
        modal.classList.remove('opacity-0', 'pointer-events-none');
        body.classList.add('overflow-hidden'); // désactive le scroll
      }

      function closeModal() {
        modal.classList.add('opacity-0', 'pointer-events-none');
        body.classList.remove('overflow-hidden'); // réactive le scroll
      }

      openBtn.addEventListener('click', openModal);
      closeBtn.addEventListener('click', closeModal);

      // Fermeture en cliquant sur le fond
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          closeModal();
        }
      });
    </script>
  </body>
</html>
